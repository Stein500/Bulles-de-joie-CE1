<!DOCTYPE html>
<html lang="fr-BJ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche - Les Bulles de Joie</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .search-box { margin: 40px 0; }
        input[type="search"] { width: 70%; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; background: #3498db; color: white; border: none; }
        .results { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Recherche sur le Site</h1>
        
        <div class="search-box">
            <form id="searchForm">
                <input type="search" id="searchInput" placeholder="Rechercher..." aria-label="Rechercher sur le site">
                <button type="submit">Rechercher</button>
            </form>
        </div>

        <div class="results" id="searchResults">
            <p>Entrez un terme de recherche pour trouver du contenu sur notre site.</p>
        </div>

        <div class="quick-links">
            <h2>Pages Principales</h2>
            <ul>
                <li><a href="/">Accueil</a></li>
                <li><a href="/pedagogie-activites.html">Pédagogie & Activités</a></li>
                <li><a href="/tarifs-inscription.html">Tarifs & Inscription</a></li>
                <li><a href="/resultats.html">Résultats</a></li>
                <li><a href="/contact.html">Contact</a></li>
            </ul>
        </div>

        <script>
            document.getElementById('searchForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const query = document.getElementById('searchInput').value;
                if (query.trim()) {
                    document.getElementById('searchResults').innerHTML = 
                        `<p>Recherche pour : <strong>"${query}"</strong></p>
                         <p>Cette fonctionnalité de recherche est en cours de développement.</p>
                         <p>En attendant, vous pouvez naviguer via les liens ci-dessus.</p>`;
                }
            });
        </script>

        <p><a href="/">← Retour à l'accueil</a></p>
    </div>
</body>
</html>
