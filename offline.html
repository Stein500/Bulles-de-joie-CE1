<!DOCTYPE html>
<html lang="fr-BJ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode Hors Ligne - Les Bulles de Joie</title>
    
    <!-- PWA Meta -->
    <meta name="theme-color" content="#FF1493">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico">
    
    <!-- Style simplifié mais cohérent -->
    <style>
        :root {
            --primary: #FF1493;
            --secondary: #A0FF4F;
            --light: #ffffff;
            --dark: #2d1b3a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #FF6B9D 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        /* Logo */
        .logo-container {
            margin-bottom: 30px;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: white;
            border-radius: 50%;
            padding: 15px;
            border: 3px solid var(--secondary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* Content */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--secondary);
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        /* Status */
        .status {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff6b6b;
            animation: blink 1.5s infinite;
        }
        
        .status-dot.online {
            background: var(--secondary);
            animation: none;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Buttons */
        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 30px 0;
        }
        
        .btn {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--secondary);
            color: var(--dark);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        /* Footer */
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo-container">
            <div class="logo">
                <img src="assets/images/logo.png" alt="Les Bulles de Joie" 
                     onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwIiBoZWlnaHQ9IjEyMCIgdmlld0JveD0iMCAwIDEyMCAxMjAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEyMCIgaGVpZ2h0PSIxMjAiIHJ4PSI2MCIgZmlsbD0iI0ZGMTQ5MyIvPjxjaXJjbGUgY3g9IjYwIiBjeT0iNTAiIHI9IjMwIiBmaWxsPSJ3aGl0ZSIvPjxjaXJjbGUgY3g9IjYwIiBjeT0iNTAiIHI9IjIwIiBmaWxsPSIjRkYxNDkzIiBmaWxsLW9wYWNpdHk9IjAuOCIvPjx0ZXh0IHg9IjYwIiB5PSI4MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0id2hpdGUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZm9udC13ZWlnaHQ9ImJvbGQiPkJESjwvdGV4dD48L3N2Zz4=';">
            </div>
        </div>
        
        <!-- Titre -->
        <h1>Mode Hors Ligne</h1>
        <p class="subtitle">
            Vous n'êtes pas connecté à Internet, mais l'essentiel reste accessible.<br>
            <em>L'excellence éducative ne s'arrête jamais !</em>
        </p>
        
        <!-- Status -->
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connexion Internet perdue</span>
        </div>
        
        <!-- Boutons -->
        <div class="buttons">
            <button class="btn btn-primary" onclick="retryConnection()">
                <span>🔄</span> Réessayer la connexion
            </button>
            <a href="/" class="btn btn-secondary">
                <span>🏠</span> Retour à l'accueil
            </a>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <p>Les Bulles de Joie - École Bilingue Parakou</p>
            <p>Application Progressive Web (PWA)</p>
            <p style="margin-top: 10px;">
                <span>🎄</span> Joyeuses Fêtes de fin d'année ! <span>🎄</span>
            </p>
        </div>
    </div>

    <script>
        // Vérification de la connexion
        function checkConnection() {
            const isOnline = navigator.onLine;
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            if (isOnline) {
                statusDot.className = 'status-dot online';
                statusText.textContent = 'Connecté ! Redirection...';
                statusText.style.color = '#A0FF4F';
                
                // Redirection après 2 secondes
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } else {
                statusDot.className = 'status-dot';
                statusText.textContent = 'Hors ligne';
                statusText.style.color = '#ff6b6b';
            }
        }
        
        // Réessayer la connexion
        function retryConnection() {
            const btn = event.target.closest('.btn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<span>⏳</span> Vérification...';
            btn.disabled = true;
            
            setTimeout(() => {
                checkConnection();
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 1000);
            }, 1500);
        }
        
        // Initialisation
        window.addEventListener('load', () => {
            checkConnection();
            setInterval(checkConnection, 5000);
        });
        
        window.addEventListener('online', checkConnection);
        window.addEventListener('offline', checkConnection);
    </script>
</body>
</html>
